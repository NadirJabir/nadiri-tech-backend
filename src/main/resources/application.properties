# 1. MariaDB Connection with Environment Variable Overrides
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mariadb://localhost:3306/nadiri_db}
spring.datasource.username=${JDBC_DATABASE_USERNAME:nadiri}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:nadiri}

# 2. Driver & Hibernate Settings
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

server.port=8081

# 3. Development & Production Settings
# Change to 'validate' in production for extra safety
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 4. Handle Large Blog Content (Important for MariaDB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
